packages:
  - 'packages/*'

# esbuild ships a platform binary via a postinstall script. This environment's
# pnpm requires explicit per-package build approval.
allowBuilds:
  # @parcel/watcher (a transitive dep of `sass`, only used by its `--watch` CLI) ships a
  # native build we don't need — we use the sass compile API, so deny its postinstall.
  '@parcel/watcher': false
  # vsce's optional native deps — only needed to publish/sign or log in, not to
  # `vsce package` a local .vsix. Deny their postinstalls.
  '@vscode/vsce-sign': false
  esbuild: true
  keytar: false
  # nx ships a postinstall that sets up its native runner — needed to build/test the
  # @weave-framework/nx plugin against a real Nx devkit in this workspace.
  nx: true
