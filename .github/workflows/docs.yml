name: Deploy docs

# Builds the documentation site (docs/) with Weave and publishes it to GitHub Pages.
#
# DEPLOY CADENCE: the `build` job runs on every push (CI validation — a broken docs build
# shows up red immediately, but nothing public changes). The `deploy` job is GATED on the
# SAME condition as the npm publish workflow — a [publish]-marked commit (or a manual
# workflow_dispatch). So weaveframework.dev only moves when the packages actually ship to
# npm, and the docs never document features that aren't installable yet. Ordinary commits
# bump the version and validate the build, but the live site stays put until you [publish].
#
# NOTE on hosting: the @weave-framework/router resolves routes from location.pathname with no
# base path, so the site must be served at the ORIGIN ROOT — a user/org page
# (username.github.io) or a custom domain. A project page at /<repo>/ would need
# basename support in the router (not yet implemented). The SPA fallback (404.html)
# is produced by docs/tools/postbuild.mjs.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build
        env:
          # Served at the ROOT of the custom domain (weaveframework.dev), so no
          # sub-path <base href> — keep absolute asset paths. (Was "/weave/" for the
          # user.github.io/weave/ project page.) The custom domain is configured in
          # the repo's Pages settings (authoritative for workflow builds); no CNAME
          # file is emitted into the artifact, to avoid a deploy-time domain conflict.
          DOCS_BASE: /

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    # Gate: publish the site to weaveframework.dev only on a [publish]-marked commit (in
    # lockstep with the npm release), or a manual dispatch. Ordinary pushes still run `build`
    # above as a CI check, but do NOT touch the live site — so docs never get ahead of npm.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[publish]')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url }}
    steps:
      # GitHub Pages' backend intermittently rejects a brand-new deployment with a terminal
      # "Deployment failed, try again later." (not a timeout — deploy-pages' built-in
      # error_count retry only covers status-POLLING errors, so it gives up immediately).
      # It's a GitHub-side transient: most [publish] deploys succeed, the odd one fails and
      # used to need a manual `gh run rerun`, surfacing a red run + a failure email each time.
      # So retry once IN-RUN: attempt 1 is allowed to fail, we wait for the backend to settle,
      # then attempt 2. Only if BOTH fail does the job go red (a real, persistent problem).
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retrying the Pages deployment
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
