name: Deploy docs

# Builds the documentation site (docs/) with Weave and deploys it to Cloudflare Workers
# static-assets (weaveframework.dev) — the same reliable path that serves the flagship demo
# (demo.weaveframework.dev). This replaced GitHub Pages, whose backend intermittently
# rejected deployments with a terminal "Deployment failed, try again later." (build always
# passed; only the Pages deploy step flaked), forcing manual reruns + failure emails.
#
# DEPLOY CADENCE: the `build` job runs on every push (CI validation — a broken docs build
# shows up red immediately, but nothing public changes). The `deploy` job is GATED on the
# SAME condition as the npm publish workflow — a [publish]-marked commit (or a manual
# workflow_dispatch). So weaveframework.dev only moves when the packages actually ship to
# npm, and the docs never document features that aren't installable yet.
#
# NOTE on hosting: the @weave-framework/router resolves routes from location.pathname with no
# base path, so the site is served at the ORIGIN ROOT of the custom domain (weaveframework.dev)
# with `not_found_handling = "single-page-application"` (docs/wrangler.toml) as the SPA
# fallback. DOCS_BASE stays "/" (absolute asset paths).
#
# SECRETS (repo → Settings → Secrets → Actions): CLOUDFLARE_API_TOKEN (a token with the
# "Workers Scripts: Edit" permission) and CLOUDFLARE_ACCOUNT_ID. The weaveframework.dev
# custom domain is attached to the `weave-docs` Worker in the Cloudflare dashboard.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

# One docs deploy at a time; let an in-progress run finish.
concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build docs
        run: pnpm docs:build
        env:
          DOCS_BASE: /

  deploy:
    needs: build
    # Gate: publish the site to weaveframework.dev only on a [publish]-marked commit (in
    # lockstep with the npm release), or a manual dispatch. Ordinary pushes still run `build`
    # above as a CI check, but do NOT touch the live site — so docs never get ahead of npm.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[publish]')
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-docs
      url: https://weaveframework.dev/
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build docs
        run: pnpm docs:build
        env:
          DOCS_BASE: /
      - name: Deploy to Cloudflare Workers (weave-docs)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs
          command: deploy
