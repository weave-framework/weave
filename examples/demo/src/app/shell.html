<header class="topbar">
  <strong class="brand"><img class="brand-logo" src="/favicon.svg" alt="" width="22" height="22" /> Weave Board</strong>
  <nav class="nav">
    <Link to="/">Board</Link>
    <Link to="/stress">Stress</Link>
    <Link to="/boom">Boom</Link>
  </nav>
</header>
<main class="main">
  <!-- resetKey clears a caught route error when the path changes, so navigating
       away from a failed route recovers — without remounting the routed view. -->
  <ErrorBoundary fallback={errorFallback} resetKey={path()}>
    <RouterView router={router} />
  </ErrorBoundary>
</main>
<!-- The global task editor overlay (Portal + transitions); opened from anywhere. -->
<TaskModal />
<!-- The global toast stack (Portal + transitions); pushed to from anywhere. -->
<ToastHost />
