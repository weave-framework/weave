<article class="card">
  <p class="title">{{ task().title }}</p>
  <div class="meta">
    <weave-badge priority={task().priority}></weave-badge>
    @if (task().assignee) {
      <span class="assignee">{{ task().assignee }}</span>
    }
    @if (mine()) {
      <span class="mine">You</span>
    }
  </div>
  <!-- Inside the board's <Link>: stop the click so editing doesn't also navigate. -->
  <button
    type="button"
    class="edit"
    aria-label="Edit task"
    on:click|stopPropagation|preventDefault={() => editor.open(task().id)}
  >
    ✎
  </button>
</article>
