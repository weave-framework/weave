<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weave Board — demo</title>
    <!-- No inline styles and no asset links here: the global stylesheet is declared
         in weave.config.ts (`styles`), and the CLI wires CSS/JS in (build injects a
         <link>/<script>; dev serves them from memory). -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
    <!-- weave dev live-reload (stripped from the production build) -->
    <script>
      new EventSource('/esbuild').addEventListener('change', () => location.reload());
    </script>
  </body>
</html>
