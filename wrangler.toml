# Cloudflare deploy config for the Weave Analytics demo (demo/).
# The build step writes the static SPA to demo/dist; this serves it as static assets
# with single-page-app fallback (deep links boot index.html, the router takes over).
name = "weave-demo"
compatibility_date = "2026-07-04"

[assets]
directory = "./demo/dist"
not_found_handling = "single-page-application"
