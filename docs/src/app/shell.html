<Toolbar sticky={{ true }} class="topbar">
  <Button variant={{ 'icon' }} label={{ 'Toggle navigation' }} class="nav-toggle" on:click={{ toggleNav }}>
    <Icon name={{ 'menu' }} />
  </Button>

  <Link to="/" class="brand">
    <img class="brand-logo" src="favicon.svg" alt="" width="24" height="24" />
    <span class="brand-name">Weave</span>
    <Badge variant={{ 'tag' }} class="brand-tag">docs</Badge>
  </Link>

  <ButtonToggle
    class="sections"
    options={{ sectionOptions }}
    value={{ activeSectionId() }}
    onChange={{ goToSection }}
    label={{ 'Documentation section' }}
  />

  <span class="weave-toolbar__spacer"></span>

  <SearchBox />

  <Button variant={{ 'icon' }} label={{ 'Toggle color theme' }} on:click={{ toggleTheme }}>
    <Icon name={{ themeIconName() }} />
  </Button>

  <Button variant={{ 'icon' }} label={{ 'Open the repository on GitHub' }} on:click={{ openRepo }}>
    <Icon name={{ 'git-branch' }} />
  </Button>
</Toolbar>

<Sidenav class="layout" api={{ setNavApi }}>
  <nav slot="drawer" class="sidebar" aria-label="Documentation">
    @for (sec of sidebarKey(); track sec) {
      <Expansion
        class="sidebar-nav"
        panels={{ sidebarPanels() }}
        defaultOpen={{ sidebarOpenIds() }}
        headingLevel={{ 2 }}
      />
    }
  </nav>

  <main class="content">
    <RouterView router={{ router }} />
  </main>
</Sidenav>
