<div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap; padding:24px;">
  <button use:tooltip={{ top }} style="padding:8px 16px; border:1px solid var(--border); border-radius:6px; cursor:pointer; background:none; color:inherit;">Top</button>
  <button use:tooltip={{ bottom }} style="padding:8px 16px; border:1px solid var(--border); border-radius:6px; cursor:pointer; background:none; color:inherit;">Bottom</button>
  <button use:tooltip={{ left }} style="padding:8px 16px; border:1px solid var(--border); border-radius:6px; cursor:pointer; background:none; color:inherit;">Left</button>
  <button use:tooltip={{ right }} style="padding:8px 16px; border:1px solid var(--border); border-radius:6px; cursor:pointer; background:none; color:inherit;">Right</button>
</div>
