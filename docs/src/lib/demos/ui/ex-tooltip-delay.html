<div style="display:flex; gap:16px; align-items:center;">
  <button use:tooltip={{ instant }} style="padding:8px 16px; border:1px solid var(--border); border-radius:6px; cursor:pointer; background:none; color:inherit;">Instant (delay 0)</button>
  <button use:tooltip={{ slow }} style="padding:8px 16px; border:1px solid var(--border); border-radius:6px; cursor:pointer; background:none; color:inherit;">Slow (delay 800)</button>
</div>
