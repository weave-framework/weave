<div style="display:flex; gap:16px; flex-wrap:wrap;">
  <div use:ripple={{ plain }} style="padding:16px 24px; border:1px solid var(--border); border-radius:6px; cursor:pointer; user-select:none;">Click for a ripple</div>
  <div use:ripple={{ centered }} style="padding:16px 24px; border:1px solid var(--border); border-radius:6px; cursor:pointer; user-select:none;">Centred ripple</div>
</div>
