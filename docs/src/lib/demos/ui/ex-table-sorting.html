<div style="max-width:420px; display:flex; flex-direction:column; gap:10px;">
  <Table columns={{ columns }} dataSource={{ rows }} trackBy={{ trackBy }} sort={{ sort() }} onSort={{ setSort }} disableClear={{ true }} ariaLabel={{ 'Sortable' }} />
  <span style="color:var(--fg-muted)">Sort: {{ sort().active || '(none)' }} {{ sort().direction || '' }}</span>
</div>
