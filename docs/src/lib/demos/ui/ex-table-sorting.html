<div style="width:100%; max-width:420px; display:flex; flex-direction:column; gap:6px;">
  <Table columns={{ columns }} dataSource={{ rows }} trackBy={{ trackBy }} sort={{ sort() }} onSort={{ setSort }} disableClear={{ true }} ariaLabel={{ 'Sortable' }} />
  <span class="demo-note">Sort: {{ sort().active || '(none)' }} {{ sort().direction || '' }}</span>
</div>
