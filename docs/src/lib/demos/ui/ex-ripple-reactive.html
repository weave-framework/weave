<div style="display:flex; flex-direction:column; gap:12px; align-items:flex-start;">
  <div use:ripple={{ opts() }} style="padding:18px 28px; border:1px solid var(--border); border-radius:8px; cursor:pointer; user-select:none; display:inline-block;">
    Centred ripple — {{ off() ? 'disabled' : 'enabled' }}
  </div>
  <button type="button" onClick={{ toggle }} style="padding:6px 12px; border:1px solid var(--border); border-radius:6px; cursor:pointer; background:var(--bg-subtle, transparent);">
    {{ off() ? 'Enable ripples' : 'Suppress ripples' }}
  </button>
</div>
