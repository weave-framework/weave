<div style="max-width:300px; display:flex; flex-direction:column; gap:10px;">
  <DateRangePicker value={{ range() }} onChange={{ setRange }} min={{ today }} dateFilter={{ isWeekday }} label={{ 'Weekdays from today' }} placeholder={{ 'Pick a range' }} />
  <span style="color:var(--muted)">Selected: {{ fmt(range()) }}</span>
</div>
