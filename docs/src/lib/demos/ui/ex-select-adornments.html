<div style="max-width:320px; display:flex; flex-direction:column; gap:14px;">
  <Select options={{ options }} value={{ country() }} onChange={{ setCountry }} label={{ 'Country' }} placeholder={{ 'Pick a country' }}>
    <Icon slot="prefix" name={{ 'search' }} />
    <span slot="suffix" style="color:var(--fg-muted)">ISO</span>
  </Select>
</div>
