<div style="max-width:320px; display:flex; flex-direction:column; gap:14px;">
  <Input value={{ email() }} onInput={{ setEmail }} type={{ 'email' }} label={{ 'Email' }} placeholder={{ 'you@example.com' }} />
  <Input value={{ age() }} onInput={{ setAge }} type={{ 'number' }} label={{ 'Age' }} placeholder={{ '18' }} />
  <Input value={{ tel() }} onInput={{ setTel }} type={{ 'tel' }} label={{ 'Phone' }} placeholder={{ '+370…' }} />
</div>
