<table style="border-collapse:collapse;">
  <thead>
    <tr>
      <th style="text-align:left; padding:6px 12px; border-bottom:1px solid var(--border);">Name</th>
      <th style="text-align:left; padding:6px 12px; border-bottom:1px solid var(--border);">Role</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td use:popoverEdit={{ nameCfg }} tabindex="0" style="padding:6px 12px; cursor:text;">{{ name() }}</td>
      <td use:popoverEdit={{ roleCfg }} tabindex="0" style="padding:6px 12px; cursor:text;">{{ role() }}</td>
    </tr>
  </tbody>
</table>
