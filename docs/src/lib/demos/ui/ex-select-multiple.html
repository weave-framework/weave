<div style="max-width:320px; display:flex; flex-direction:column; gap:14px;">
  <Select multiple={{ true }} options={{ options }} value={{ langs() }} onChange={{ setLangs }} label={{ 'Languages' }} placeholder={{ 'Choose languages' }} />
  <span style="color:var(--muted)">Selected: {{ langs().join(', ') || 'none' }}</span>
</div>
