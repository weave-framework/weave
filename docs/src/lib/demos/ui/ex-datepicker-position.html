<div style="max-width:280px; display:flex; flex-direction:column; gap:10px; margin-top:120px;">
  <Datepicker value={{ date() }} onChange={{ setDate }} position={{ 'top-start' }} label={{ 'Opens upward' }} placeholder={{ 'Pick a date' }} />
  <span style="color:var(--muted)">Selected: {{ fmt(date()) }}</span>
</div>
