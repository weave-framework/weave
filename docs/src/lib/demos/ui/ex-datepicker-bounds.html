<div style="max-width:280px; display:flex; flex-direction:column; gap:10px;">
  <Datepicker value={{ date() }} onChange={{ setDate }} min={{ min }} max={{ max }} label={{ 'This month only' }} placeholder={{ 'Pick a day' }} />
  <span style="color:var(--muted)">Selected: {{ fmt(date()) }}</span>
</div>
