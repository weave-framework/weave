<div style="display:flex; flex-direction:column; gap:12px;">
  <Checkbox
    checked={{ subscribe() }}
    onChange={{ setSubscribe }}
    name={{ 'newsletter' }}
    class={{ 'my-checkbox' }}
    label={{ 'Subscribe to the newsletter' }} />
  <span class="demo-note">Submits as <code>newsletter={{ subscribe() ? 'on' : '' }}</code></span>
</div>
