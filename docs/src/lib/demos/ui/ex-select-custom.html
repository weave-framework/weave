<div style="width:100%; max-width:320px; display:flex; flex-direction:column; gap:14px;">
  <Select
    options={{ countries }}
    optionValue={{ optCode }}
    optionLabel={{ optName }}
    optionDescription={{ optRegion }}
    emit={{ 'object' }}
    value={{ picked() }}
    onChange={{ setPicked }}
    label={{ 'Country' }}
    placeholder={{ 'Pick a country' }}
  />
  <span class="demo-note">Object: {{ picked() ? picked().name + ' (' + picked().region + ')' : 'none' }}</span>
</div>
