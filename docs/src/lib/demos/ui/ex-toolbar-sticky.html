<div style="height:180px; overflow:auto; border:1px solid var(--border); border-radius:8px;">
  <Toolbar sticky={{ true }}>
    <div class="weave-toolbar__start"><strong>Sticky header</strong></div>
    <span class="weave-toolbar__spacer"></span>
    <div class="weave-toolbar__end">
      <Button variant={{ 'icon' }} label={{ 'More' }}><Icon name={{ 'more-vertical' }} /></Button>
    </div>
  </Toolbar>
  <p style="padding:12px 16px; color:var(--fg-muted)">Scroll this panel — the bar stays pinned to the top.</p>
  <p style="padding:12px 16px">Row 1</p>
  <p style="padding:12px 16px">Row 2</p>
  <p style="padding:12px 16px">Row 3</p>
  <p style="padding:12px 16px">Row 4</p>
  <p style="padding:12px 16px">Row 5</p>
  <p style="padding:12px 16px">Row 6</p>
</div>
